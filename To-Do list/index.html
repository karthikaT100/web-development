<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Responsive To-Do List App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="subtitle">Stay organized with</p>
        <h1>My To-Do List</h1>
      </div>
      <div class="theme-badge">Task Tracker</div>
    </header>

    <section class="task-input-panel">
      <form id="task-form" class="task-form">
        <input
          type="text"
          id="task-input"
          placeholder="Add a new task..."
          aria-label="New task"
        />
        <button type="submit" class="btn-primary">Add Task</button>
      </form>
      <p id="error-message" class="error-message" aria-live="polite"></p>
    </section>

    <section class="task-toolbar">
      <div class="filters" role="group" aria-label="Task filters">
        <button type="button" class="filter-btn active" data-filter="all">All</button>
        <button type="button" class="filter-btn" data-filter="active">Active</button>
        <button type="button" class="filter-btn" data-filter="completed">Completed</button>
      </div>
      <div class="task-count" aria-live="polite">
        <span id="task-count">0</span> tasks remaining
      </div>
    </section>

    <section class="task-list-panel">
      <ul id="task-list" class="task-list" aria-label="Task list"></ul>
      <p id="empty-state" class="empty-state">No tasks yet. Add one to get started!</p>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>

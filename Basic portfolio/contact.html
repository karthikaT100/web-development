<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Contact page with an accessible, keyboard-friendly form." />
    <meta name="author" content="KARTHIKA" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
    <title>Contact — KARTHIKA</title>
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header" role="banner">
        <div class="container header-row">
          <a class="brand" href="index.html">KARTHIKA</a>
          <button class="mobile-menu-button" aria-controls="site-navigation" aria-expanded="false" aria-label="Toggle navigation">
            <span class="hamburger" aria-hidden="true"></span>
          </button>
          <nav id="site-navigation" class="site-navigation" role="navigation" aria-label="Primary">
            <ul class="nav-list">
              <li><a href="index.html">Home</a></li>
              <li><a href="about.html">About</a></li>
              <li><a href="portfolio.html">Portfolio</a></li>
              <li><a href="contact.html" aria-current="page">Contact</a></li>
            </ul>
          </nav>
        </div>
      </header>

      <main id="main-content" class="site-main" role="main">
        <section class="contact-hero" aria-labelledby="contact-heading">
          <div class="container">
            <h1 id="contact-heading">Let’s work together</h1>
            <p class="lead">Use the form below to send a brief message. I’ll reply within a few business days.</p>
          </div>
        </section>

        <section class="contact-form-section" aria-labelledby="form-heading">
          <div class="container">
            <h2 id="form-heading">Contact</h2>
            <form id="contactForm" class="contact-form" action="#" method="post" novalidate>
              <div id="form-status" aria-live="polite" role="status" class="sr-only"></div>
              <div class="form-grid">
                <div class="form-group">
                  <label for="name">Name</label>
                  <input id="name" name="name" type="text" required autocomplete="name" />
                </div>
                <div class="form-group">
                  <label for="email">Email</label>
                  <input id="email" name="email" type="email" required autocomplete="email" />
                </div>
              </div>
              <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="6" required></textarea>
              </div>
              <p class="form-note">All fields required. Use the Tab key to navigate.</p>
              <button class="button button-primary" type="submit">Send message</button>
            </form>
          </div>
        </section>
      </main>

      <footer class="site-footer" role="contentinfo">
        <div class="container">
          <p>© 2026 KARTHIKA — Reach out for accessible, modern websites.</p>
        </div>
      </footer>
    </div>
    <script src="script.js" defer></script>
  </body>
</html>
